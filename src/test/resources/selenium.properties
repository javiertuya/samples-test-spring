# Configuracion de la aplicación y webdriver para los tests con Selenium
# En CI estas propiedades se remplazaran por las de la aplicacion desplegada

# En local, por defecto usan un navegador chrome local y la aplicacion desplegada en localhost
# Los tests pueden hacer override del puerto cuando spring se ejecuta usando un random port
application.url=http://localhost
application.port=8080

# Establece la forma de instanciar el driver
# - Vacio: navegador chrome local
# - "headless": navegador chrome local en modo headless
# - Cualquier otro valor: url de un remote web driver
remote.web.driver.url=
