#Por defecto, usa H2 como base de datos un la url jdbc:h2:mem:testdb, no hace falta configurar el acceso
#Con estas propieades adicionales permite acceder a la base de datos mientras la aplicacion esta ejecutandose
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true
#Acceder a este path desde un navegador: http://localhost:8080/h2-console?url=jdbc:h2:mem:testdb
#(usuario SA y password en blanco)

#Desactiva la ejecucion de los scripts de inicializacion SQL (data.sql/schema.sql) en los tests,
#de modo que la base de datos arranca en blanco (las tablas las sigue creando Hibernate con ddl-auto).
#Esta es la forma soportada desde Spring Boot 2.5 en adelante; sustituye a la antigua y obsoleta
#spring.datasource.data= y evita tener que crear un data.sql de test que borre datos.
spring.sql.init.mode=never
